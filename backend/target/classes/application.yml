server:
  port: 8080

spring:
  application:
    name: hospital-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # MySQL 5.7 优先，兼容 8.0：
    # 1) 显式 serverTimezone，避免时区告警
    # 2) useUnicode/characterEncoding 保证中文
    # 3) allowPublicKeyRetrieval 兼容部分 8.0 认证场景
    url: jdbc:mysql://8.148.155.226:3306/hospital_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Root@123456
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    # 已生成随机密钥（UTF-8 长度满足 HS256）；生产建议用环境变量覆盖 SECURITY_JWT_SECRET
    secret: "8UtPZSXT4WxHenouMEF7m1uRPRK6Yla+w+9P86OhM8In3AF1KaxSbnlcdEDNPWaD"
    expire-seconds: 7200

app:
  bootstrap:
    admin:
      phone: 13800000000
      password: admin123456
  storage:
    # 附件根目录（相对 JVM 启动时的工作目录 user.dir）。在 backend 目录下执行 mvn spring-boot:run 时即为 backend/upload
    # 图片写入 upload/images/，其余写入 upload/files/（见 LocalFileStorage）
    root: upload
